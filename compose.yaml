services:
  testrunner:
    image: $DEV_IMAGE_TAG
    build:
      dockerfile: Dockerfile.dev
      context: .
      args:
        OTP_VERSION: $OTP_VERSION
    volumes:
      - .:$PWD
    hostname: epg_migrator
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: $PWD
    command: /sbin/init

  postgres:
    image: postgres:15-bookworm
    command: >
      -c 'wal_level=logical'
      -c 'shared_preload_libraries=pg_stat_statements'
      -c 'pg_stat_statements.track=all'
      -c 'pg_stat_statements.max=10000'
    environment:
      POSTGRES_DB: "migrator_db"
      POSTGRES_USER: "migrator"
      POSTGRES_PASSWORD: "migrator"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrator -d migrator_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
